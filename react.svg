@import "tailwindcss";

:root {
  color: #e2e8f0;
  background: #020617;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
    sans-serif;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  min-width: 320px;
  min-height: 100vh;
  margin: 0;
  background:
    linear-gradient(180deg, rgba(15, 23, 42, 0.88), #020617 32rem),
    #020617;
}

button,
input,
textarea,
select {
  font: inherit;
}

::selection {
  background: rgba(103, 232, 249, 0.28);
}
